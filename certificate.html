<!DOCTYPE html>
<html>
<head>
  <title>Certificate Verification</title>
</head>
<body>

<h2>Certificate Details</h2>
<div id="result">Loading...</div>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTj_KcGyWh0Mz6eWFtwefKzMsHJBWj8up9tdovXkom3xh8jH8czxwqGHJrYcYziSnyZbCBe0u6AZliC/pub?gid=0&single=true&output=csv";

const urlParams = new URLSearchParams(window.location.search);
const certId = urlParams.get('id');

fetch(sheetURL)
  .then(res => res.text())
  .then(data => {
    const rows = data.split("\n").map(r => r.split(","));

    let found = false;

    for (let i = 1; i < rows.length; i++) {
      if (rows[i][0] === certId) {
        found = true;

        document.getElementById("result").innerHTML = `
          <p><b>Name:</b> ${rows[i][1]}</p>
          <p><b>Course:</b> ${rows[i][2]}</p>
          <p><b>Issue Date:</b> ${rows[i][3]}</p>
          <p><b>Issued By:</b> ${rows[i][4]}</p>
          <p><b>Status:</b> <span style="color:green;">${rows[i][6]}</span></p>
          <p><a href="${rows[i][5]}" target="_blank">View Certificate</a></p>
        `;
        break;
      }
    }

    if (!found) {
      document.getElementById("result").innerHTML =
        "<p style='color:red;'>Certificate Not Found</p>";
    }
  });
</script>

</body>
</html>
